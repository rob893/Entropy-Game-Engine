# This workflow is triggered manually using workflow_dispatch
#
# Secrets used:
# NPM_TOKEN: access token for NPM. Obtained on NPM site.

name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Confirm
        required: true
      git-ref:
        description: Git Ref (Optional)
        required: false

jobs:
  check_response:
    runs-on: ubuntu-latest
    name: Check Response
    steps:
      - name: Check Response
        run: |
          response=${{ github.event.inputs.confirm }}
          if [ ${response^^} != 'YES' ]
          then
            exit 1 
          fi

  publish_packages:
    runs-on: ubuntu-latest
    name: Publish Packages
    needs:
      - check_response
    steps:
      - name: Checkout
        if: github.event.inputs.git-ref == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout (Custom Ref)
        if: github.event.inputs.git-ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Build packages
        run: npm run compile
      - name: Authenticate with NPM
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> .npmrc
          npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish
        run: npm publish --workspaces --access public --no-git-checks
